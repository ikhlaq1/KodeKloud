
name: CI Pipeline

on:
  push:
    branches: [ build-test-branch ]
  pull_request:
    branches: [ main ]

jobs:
  lint-test-build:
    name: Lint, Test and Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4  # Changed from @latest

      - name: Setup Node.js
        uses: actions/setup-node@v4  # Changed from @latest
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup JDK 17
        uses: actions/setup-java@v4  # Changed from @latest
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint
        continue-on-error: true

      - name: Run tests
        run: npm test -- --watchAll=false
        continue-on-error: true

      - name: Build Android Debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4  # Changed from @latest
        with:
          name: debug-apk-${{ github.run_number }}
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7